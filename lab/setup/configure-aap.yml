---
- name: Configure AAP Controller for DCC workshop
  hosts: localhost
  gather_facts: false
  connection: local

  vars_files:
    - vars/workshop.yml

  vars:
    controller_oauth_token: "{{ controller_oauth_token_override | default(omit) }}"

  module_defaults:
    group/ansible.controller.controller:
      controller_host: "{{ aap_host }}"
      controller_username: "{{ aap_user }}"
      controller_password: "{{ aap_password }}"
      controller_oauthtoken: "{{ controller_oauth_token | default(omit) }}"
      validate_certs: false

  tasks:
    # ── Credential ─────────────────────────────────────────────────────
    - name: Create machine credential for app server
      ansible.controller.credential:
        name: "{{ workshop_credential_name }}"
        organization: "{{ workshop_org }}"
        credential_type: Machine
        inputs:
          username: rhel
          password: "{{ aap_password }}"
          become_method: sudo
          become_username: root
        state: present

    # ── Project ────────────────────────────────────────────────────────
    - name: Create DCC workshop project
      ansible.controller.project:
        name: "{{ workshop_project_name }}"
        organization: "{{ workshop_org }}"
        scm_type: git
        scm_url: "{{ gitea_url }}/{{ gitea_repo }}.git"
        scm_branch: dev
        scm_update_on_launch: false
        state: present
      register: _project

    - name: Sync project from SCM
      ansible.controller.project_update:
        project: "{{ workshop_project_name }}"
        wait: true
        timeout: 120

    # ── Inventory ──────────────────────────────────────────────────────
    - name: Create DCC workshop inventory
      ansible.controller.inventory:
        name: "{{ workshop_inventory_name }}"
        organization: "{{ workshop_org }}"
        variables:
          ansible_become: true
          target_service: httpd
          target_cve: "{{ target_cve }}"
          target_advisory: "{{ target_advisory }}"
        state: present

    - name: Add appservers group
      ansible.controller.group:
        name: appservers
        inventory: "{{ workshop_inventory_name }}"
        state: present

    - name: Add app-server host
      ansible.controller.host:
        name: app-server
        inventory: "{{ workshop_inventory_name }}"
        variables:
          ansible_host: "{{ app_server_ip | default('rhel01') }}"
        state: present

    - name: Add app-server-2 host
      ansible.controller.host:
        name: app-server-2
        inventory: "{{ workshop_inventory_name }}"
        variables:
          ansible_host: "{{ app_server_2_ip | default('rhel02') }}"
        state: present

    - name: Add app-server to appservers group
      ansible.controller.group:
        name: appservers
        inventory: "{{ workshop_inventory_name }}"
        hosts:
          - app-server
          - app-server-2
        preserve_existing_hosts: true
        state: present

    # ── Job Templates (Module 1: DEFEND) ───────────────────────────────
    - name: Create job template -- Deploy Application
      ansible.controller.job_template:
        name: "Deploy Application"
        organization: "{{ workshop_org }}"
        project: "{{ workshop_project_name }}"
        playbook: "lab/playbooks/defend/deploy-application.yml"
        inventory: "{{ workshop_inventory_name }}"
        credential: "{{ workshop_credential_name }}"
        execution_environment: "{{ workshop_ee_name }}"
        ask_limit_on_launch: true
        extra_vars:
          target_cve: "{{ target_cve }}"
          target_advisory: "{{ target_advisory }}"
        state: present

    - name: Create job template -- Scan System
      ansible.controller.job_template:
        name: "Scan System"
        organization: "{{ workshop_org }}"
        project: "{{ workshop_project_name }}"
        playbook: "lab/playbooks/defend/scan-system.yml"
        inventory: "{{ workshop_inventory_name }}"
        credential: "{{ workshop_credential_name }}"
        execution_environment: "{{ workshop_ee_name }}"
        extra_vars:
          target_cve: "{{ target_cve }}"
        state: present

    - name: Create job template -- Contain Service
      ansible.controller.job_template:
        name: "Contain Service"
        organization: "{{ workshop_org }}"
        project: "{{ workshop_project_name }}"
        playbook: "lab/playbooks/defend/contain-service.yml"
        inventory: "{{ workshop_inventory_name }}"
        credential: "{{ workshop_credential_name }}"
        execution_environment: "{{ workshop_ee_name }}"
        state: present

    - name: Create job template -- Harden Posture
      ansible.controller.job_template:
        name: "Harden Posture"
        organization: "{{ workshop_org }}"
        project: "{{ workshop_project_name }}"
        playbook: "lab/playbooks/defend/harden-posture.yml"
        inventory: "{{ workshop_inventory_name }}"
        credential: "{{ workshop_credential_name }}"
        execution_environment: "{{ workshop_ee_name }}"
        state: present

    # ── Job Templates (Module 2: CONTAIN) ──────────────────────────────
    - name: Create job template -- Pre-Patch Check
      ansible.controller.job_template:
        name: "Pre-Patch Check"
        organization: "{{ workshop_org }}"
        project: "{{ workshop_project_name }}"
        playbook: "lab/playbooks/contain/pre-patch-check.yml"
        inventory: "{{ workshop_inventory_name }}"
        credential: "{{ workshop_credential_name }}"
        execution_environment: "{{ workshop_ee_name }}"
        extra_vars:
          enforce_maintenance_window: false
        state: present

    - name: Create job template -- Patch System
      ansible.controller.job_template:
        name: "Patch System"
        organization: "{{ workshop_org }}"
        project: "{{ workshop_project_name }}"
        playbook: "lab/playbooks/contain/patch-system.yml"
        inventory: "{{ workshop_inventory_name }}"
        credential: "{{ workshop_credential_name }}"
        execution_environment: "{{ workshop_ee_name }}"
        extra_vars:
          target_advisory: "{{ target_advisory }}"
        state: present

    - name: Create job template -- Post-Patch Verify
      ansible.controller.job_template:
        name: "Post-Patch Verify"
        organization: "{{ workshop_org }}"
        project: "{{ workshop_project_name }}"
        playbook: "lab/playbooks/contain/post-patch-verify.yml"
        inventory: "{{ workshop_inventory_name }}"
        credential: "{{ workshop_credential_name }}"
        execution_environment: "{{ workshop_ee_name }}"
        extra_vars:
          target_cve: "{{ target_cve }}"
        state: present

    - name: Create job template -- Report Compliance
      ansible.controller.job_template:
        name: "Report Compliance"
        organization: "{{ workshop_org }}"
        project: "{{ workshop_project_name }}"
        playbook: "lab/playbooks/contain/report-compliance.yml"
        inventory: "{{ workshop_inventory_name }}"
        credential: "{{ workshop_credential_name }}"
        execution_environment: "{{ workshop_ee_name }}"
        extra_vars:
          target_cve: "{{ target_cve }}"
          target_advisory: "{{ target_advisory }}"
        state: present

    # ── Job Templates (Module 3: COMPLY) ───────────────────────────────
    - name: Create job template -- Compliance Audit
      ansible.controller.job_template:
        name: "Compliance Audit"
        organization: "{{ workshop_org }}"
        project: "{{ workshop_project_name }}"
        playbook: "lab/playbooks/comply/compliance-audit.yml"
        inventory: "{{ workshop_inventory_name }}"
        credential: "{{ workshop_credential_name }}"
        execution_environment: "{{ workshop_ee_name }}"
        ask_variables_on_launch: true
        state: present

    - name: Create job template -- CIS Harden
      ansible.controller.job_template:
        name: "CIS Harden"
        organization: "{{ workshop_org }}"
        project: "{{ workshop_project_name }}"
        playbook: "lab/playbooks/comply/cis-harden.yml"
        inventory: "{{ workshop_inventory_name }}"
        credential: "{{ workshop_credential_name }}"
        execution_environment: "{{ workshop_ee_name }}"
        state: present

    - name: Create job template -- Compliance Report
      ansible.controller.job_template:
        name: "Compliance Report"
        organization: "{{ workshop_org }}"
        project: "{{ workshop_project_name }}"
        playbook: "lab/playbooks/comply/generate-compliance-report.yml"
        inventory: "{{ workshop_inventory_name }}"
        credential: "{{ workshop_credential_name }}"
        execution_environment: "{{ workshop_ee_name }}"
        extra_vars:
          target_cve: "{{ target_cve }}"
          target_advisory: "{{ target_advisory }}"
        state: present

    - name: Create job template -- Build Hardened Container
      ansible.controller.job_template:
        name: "Build Hardened Container"
        organization: "{{ workshop_org }}"
        project: "{{ workshop_project_name }}"
        playbook: "lab/playbooks/comply/build-container.yml"
        inventory: "{{ workshop_inventory_name }}"
        credential: "{{ workshop_credential_name }}"
        execution_environment: "{{ workshop_ee_name }}"
        state: present

    - name: Create job template -- Scan Image
      ansible.controller.job_template:
        name: "Scan Image"
        organization: "{{ workshop_org }}"
        project: "{{ workshop_project_name }}"
        playbook: "lab/playbooks/comply/scan-image.yml"
        inventory: "{{ workshop_inventory_name }}"
        credential: "{{ workshop_credential_name }}"
        execution_environment: "{{ workshop_ee_name }}"
        state: present

    - name: Create job template -- Push to Registry
      ansible.controller.job_template:
        name: "Push to Registry"
        organization: "{{ workshop_org }}"
        project: "{{ workshop_project_name }}"
        playbook: "lab/playbooks/comply/push-to-registry.yml"
        inventory: "{{ workshop_inventory_name }}"
        credential: "{{ workshop_credential_name }}"
        execution_environment: "{{ workshop_ee_name }}"
        state: present

    # ── Workflow: Vulnerability Containment ────────────────────────────
    - name: Create workflow -- Vulnerability Containment
      ansible.controller.workflow_job_template:
        name: "Vulnerability Containment"
        organization: "{{ workshop_org }}"
        inventory: "{{ workshop_inventory_name }}"
        ask_limit_on_launch: true
        state: present

    - name: Build Vulnerability Containment workflow nodes
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "Vulnerability Containment"
        identifier: "{{ item.id }}"
        unified_job_template: "{{ item.template }}"
        organization: "{{ workshop_org }}"
        state: present
      loop:
        - { id: scan, template: "Scan System" }
        - { id: contain, template: "Contain Service" }
        - { id: harden, template: "Harden Posture" }

    - name: Link Vulnerability Containment workflow -- scan to contain
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "Vulnerability Containment"
        identifier: contain
        organization: "{{ workshop_org }}"
        success_nodes:
          - scan
        state: present

    - name: Link Vulnerability Containment workflow -- contain to harden
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "Vulnerability Containment"
        identifier: harden
        organization: "{{ workshop_org }}"
        success_nodes:
          - contain
        state: present

    # ── Workflow: Policy-Gated Patching (attendees build this in the UI) ─
    - name: Create workflow -- Policy-Gated Patching
      ansible.controller.workflow_job_template:
        name: "Policy-Gated Patching"
        organization: "{{ workshop_org }}"
        inventory: "{{ workshop_inventory_name }}"
        state: present
      tags:
        - patching_workflow
        - never

    - name: Build Policy-Gated Patching workflow nodes
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "Policy-Gated Patching"
        identifier: "{{ item.id }}"
        unified_job_template: "{{ item.template }}"
        organization: "{{ workshop_org }}"
        state: present
      loop:
        - { id: precheck, template: "Pre-Patch Check" }
        - { id: patch, template: "Patch System" }
        - { id: verify, template: "Post-Patch Verify" }
        - { id: report, template: "Report Compliance" }
      tags:
        - patching_workflow
        - never

    - name: Create approval node for patching workflow
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "Policy-Gated Patching"
        identifier: approval
        approval_node:
          name: "Approve Patch Application"
          description: "Security team approval required before applying {{ target_advisory }}"
          timeout: 900
        organization: "{{ workshop_org }}"
        state: present
      tags:
        - patching_workflow
        - never

    - name: Link patching workflow -- precheck to approval
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "Policy-Gated Patching"
        identifier: approval
        organization: "{{ workshop_org }}"
        success_nodes:
          - precheck
        state: present
      tags:
        - patching_workflow
        - never

    - name: Link patching workflow -- approval to patch
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "Policy-Gated Patching"
        identifier: patch
        organization: "{{ workshop_org }}"
        success_nodes:
          - approval
        state: present
      tags:
        - patching_workflow
        - never

    - name: Link patching workflow -- patch to verify
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "Policy-Gated Patching"
        identifier: verify
        organization: "{{ workshop_org }}"
        success_nodes:
          - patch
        state: present
      tags:
        - patching_workflow
        - never

    - name: Link patching workflow -- verify to report
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "Policy-Gated Patching"
        identifier: report
        organization: "{{ workshop_org }}"
        success_nodes:
          - verify
        state: present
      tags:
        - patching_workflow
        - never

    # ── Workflow: Compliance and Hardening ──────────────────────────────
    - name: Create workflow -- Compliance and Hardening
      ansible.controller.workflow_job_template:
        name: "Compliance and Hardening"
        organization: "{{ workshop_org }}"
        inventory: "{{ workshop_inventory_name }}"
        state: present

    - name: Build Compliance workflow nodes
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "Compliance and Hardening"
        identifier: "{{ item.id }}"
        unified_job_template: "{{ item.template }}"
        organization: "{{ workshop_org }}"
        extra_data: "{{ item.extra | default(omit) }}"
        state: present
      loop:
        - { id: audit_pre, template: "Compliance Audit", extra: { audit_phase: "pre" } }
        - { id: harden, template: "CIS Harden" }
        - { id: audit_post, template: "Compliance Audit", extra: { audit_phase: "post" } }
        - { id: report, template: "Compliance Report" }
        - { id: build, template: "Build Hardened Container" }
        - { id: scan, template: "Scan Image" }
        - { id: push, template: "Push to Registry" }

    - name: Link Compliance workflow -- audit_pre to harden
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "Compliance and Hardening"
        identifier: harden
        organization: "{{ workshop_org }}"
        success_nodes:
          - audit_pre
        state: present

    - name: Link Compliance workflow -- harden to audit_post
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "Compliance and Hardening"
        identifier: audit_post
        organization: "{{ workshop_org }}"
        success_nodes:
          - harden
        state: present

    - name: Link Compliance workflow -- audit_post to report
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "Compliance and Hardening"
        identifier: report
        organization: "{{ workshop_org }}"
        success_nodes:
          - audit_post
        state: present

    - name: Link Compliance workflow -- report to build
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "Compliance and Hardening"
        identifier: build
        organization: "{{ workshop_org }}"
        success_nodes:
          - report
        state: present

    - name: Link Compliance workflow -- build to scan
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "Compliance and Hardening"
        identifier: scan
        organization: "{{ workshop_org }}"
        success_nodes:
          - build
        state: present

    - name: Link Compliance workflow -- scan to push
      ansible.controller.workflow_job_template_node:
        workflow_job_template: "Compliance and Hardening"
        identifier: push
        organization: "{{ workshop_org }}"
        success_nodes:
          - scan
        state: present

    # ── Verification ───────────────────────────────────────────────────
    - name: Report AAP configuration status
      ansible.builtin.debug:
        msg: |
          AAP Controller configured for DCC workshop:
            Project:    {{ workshop_project_name }}
            Inventory:  {{ workshop_inventory_name }}
            Credential: {{ workshop_credential_name }}
            Job Templates:      14 (4 defend + 4 contain + 6 comply)
            Workflows:          3 (Vulnerability Containment, Policy-Gated Patching, Compliance and Hardening)
            Approval node:      Approve Patch Application (15 min timeout)

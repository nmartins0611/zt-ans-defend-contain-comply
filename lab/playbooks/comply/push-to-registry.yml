---
- name: Push container image to registry
  hosts: rhel01
  gather_facts: false

  vars:
    container_name: parasol-app
    container_tag: latest
    registry_url: "localhost:5000"
    verify_after_push: true

  tasks:
    - name: Ensure local registry is running
      containers.podman.podman_container:
        name: workshop-registry
        image: docker.io/library/registry:2
        state: started
        ports:
          - "5000:5000"
        volumes:
          - registry-data:/var/lib/registry
      register: _registry_container

    - name: Wait for registry to be available
      ansible.builtin.uri:
        url: "http://{{ registry_url }}/v2/"
        status_code: [200, 401]
      retries: 5
      delay: 3
      register: _registry_health
      until: _registry_health is succeeded

    - name: Push image to local registry
      containers.podman.podman_image:
        name: "{{ registry_url }}/{{ container_name }}"
        tag: "{{ container_tag }}"
        push: true
        push_args:
          dest: "{{ registry_url }}/{{ container_name }}:{{ container_tag }}"
      register: _push_result

    - name: Verify image exists in registry
      ansible.builtin.uri:
        url: "http://{{ registry_url }}/v2/{{ container_name }}/tags/list"
        return_content: true
      register: _registry_tags
      when: verify_after_push | bool

    - name: Assert image tag is present in registry
      ansible.builtin.assert:
        that:
          - container_tag in (_registry_tags.json.tags | default([]))
        fail_msg: "Image tag {{ container_tag }} not found in registry after push."
        success_msg: "Image {{ container_name }}:{{ container_tag }} confirmed in registry."
      when: verify_after_push | bool

    - name: Run container to verify it serves content
      containers.podman.podman_container:
        name: "{{ container_name }}-verify"
        image: "{{ registry_url }}/{{ container_name }}:{{ container_tag }}"
        state: started
        ports:
          - "8443:8443"
      register: _verify_container

    - name: Wait for application container to respond
      ansible.builtin.uri:
        url: "http://localhost:8443/"
        status_code: [200]
      retries: 5
      delay: 3
      register: _app_health
      until: _app_health is succeeded

    - name: Verify application content
      ansible.builtin.assert:
        that:
          - "'Parasol Finance' in _app_health.content"
        success_msg: "Application container is serving content correctly."

    - name: Remove verification container
      containers.podman.podman_container:
        name: "{{ container_name }}-verify"
        state: absent

    - name: Report push and verification results
      ansible.builtin.debug:
        msg: |
          Supply chain delivery complete:
            Registry: {{ registry_url }}
            Image: {{ container_name }}:{{ container_tag }}
            Tags in registry: {{ _registry_tags.json.tags | default([]) | join(', ') }}
            Application verified: healthy

---
- name: Scan system for known CVEs
  hosts: appservers
  gather_facts: true

  vars:
    scan_output_dir: /tmp/cve-scan-results
    target_cve: "CVE-2024-38476"

  tasks:
    - name: Ensure scan output directory exists
      ansible.builtin.file:
        path: "{{ scan_output_dir }}"
        state: directory
        mode: "0755"

    - name: Query available security advisories
      ansible.builtin.command:
        cmd: yum updateinfo list cves --quiet
      register: cve_list
      changed_when: false

    - name: Write raw CVE list to file
      ansible.builtin.copy:
        content: "{{ cve_list.stdout }}"
        dest: "{{ scan_output_dir }}/cve-list-raw.txt"
        mode: "0644"

    - name: Check if target CVE is present
      ansible.builtin.set_fact:
        cve_detected: "{{ target_cve in cve_list.stdout }}"

    - name: Report CVE detection result
      ansible.builtin.debug:
        msg: >-
          {{ 'CRITICAL: ' ~ target_cve ~ ' detected on ' ~ inventory_hostname
             if cve_detected | bool
             else 'Target CVE ' ~ target_cve ~ ' not found in advisory list.' }}

    - name: Gather affected package details
      ansible.builtin.command:
        cmd: "yum updateinfo info {{ target_cve }} --quiet"
      register: cve_details
      changed_when: false
      when: cve_detected | bool

    - name: Write CVE details report
      ansible.builtin.copy:
        content: |
          === CVE Scan Report ===
          Host: {{ inventory_hostname }}
          Date: {{ ansible_date_time.iso8601 }}
          Target CVE: {{ target_cve }}
          Detected: {{ cve_detected }}

          --- Advisory Details ---
          {{ cve_details.stdout | default('No details available') }}
        dest: "{{ scan_output_dir }}/scan-report.txt"
        mode: "0644"
      when: cve_detected | bool

    - name: Set scan result fact for downstream workflows
      ansible.builtin.set_stats:
        data:
          cve_detected: "{{ cve_detected }}"
          cve_id: "{{ target_cve }}"
          scan_host: "{{ inventory_hostname }}"

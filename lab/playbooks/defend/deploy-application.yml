---
- name: Deploy vulnerable application to app server
  hosts: appservers
  gather_facts: true
  become: true

  vars:
    target_cve: "{{ target_cve | default('CVE-2024-38476') }}"
    target_advisory: "{{ target_advisory | default('RHSA-2024:5138') }}"
    vulnerable_httpd_version: "{{ vulnerable_httpd_version | default('2.4.57-5.el9') }}"
    company_name: "{{ company_name | default('Meridian Financial') }}"
    central_host: "{{ hostvars['central']['ansible_host'] | default('central') }}"
    errata_repo_port: "{{ errata_repo_port | default('8085') }}"
    splunk_hec_url: "http://{{ central_host }}:8088/services/collector/event"
    splunk_hec_token: "{{ splunk_hec_token | default('a1b2c3d4-e5f6-7890-abcd-ef1234567890') }}"

  tasks:
    - name: Ensure SELinux is enforcing
      ansible.posix.selinux:
        policy: targeted
        state: enforcing

    - name: Activate enforcing mode without reboot
      ansible.builtin.command: setenforce 1
      changed_when: true
      failed_when: false

    - name: Install firewalld
      ansible.builtin.dnf:
        name: firewalld
        state: present

    - name: Ensure firewalld is running
      ansible.builtin.systemd:
        name: firewalld
        state: started
        enabled: true

    - name: Check if internal-only zone exists
      ansible.builtin.command: firewall-cmd --info-zone=internal-only
      register: _zone_check
      failed_when: false
      changed_when: false

    - name: Create internal-only firewall zone
      ansible.builtin.command: firewall-cmd --permanent --new-zone=internal-only
      when: _zone_check.rc != 0
      register: _zone_created
      changed_when: _zone_created.rc == 0

    - name: Reload firewall to activate new zone
      ansible.builtin.command: firewall-cmd --reload
      when: _zone_created is changed
      changed_when: true

    - name: Allow http and https in public zone
      ansible.posix.firewalld:
        service: "{{ item }}"
        zone: public
        permanent: true
        immediate: true
        state: enabled
      loop:
        - http
        - https

    - name: Install vulnerable httpd version
      ansible.builtin.dnf:
        name: "httpd-{{ vulnerable_httpd_version }}"
        state: present
        allow_downgrade: true

    - name: Install mod_ssl
      ansible.builtin.dnf:
        name: mod_ssl
        state: present

    - name: Remove default ssl.conf to avoid missing certificate errors
      ansible.builtin.file:
        path: /etc/httpd/conf.d/ssl.conf
        state: absent

    - name: Remove mod_http2 configs incompatible with downgraded httpd
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/httpd/conf.modules.d/10-h2.conf
        - /etc/httpd/conf.modules.d/10-proxy_h2.conf

    - name: Deploy Meridian Financial landing page
      ansible.builtin.copy:
        content: |
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>{{ company_name }} - Customer Portal</title>
            <style>
              body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 40px;
                     background: #f5f5f5; color: #1a1a1a; }
              .container { max-width: 800px; margin: 0 auto; background: white;
                           padding: 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
              h1 { color: #003366; border-bottom: 2px solid #003366; padding-bottom: 10px; }
              .status { background: #e8f5e9; padding: 15px; border-radius: 4px;
                        border-left: 4px solid #2e7d32; margin: 20px 0; }
              .host { background: #e3f2fd; padding: 15px; border-radius: 4px;
                      border-left: 4px solid #1565c0; margin: 20px 0; }
              .footer { margin-top: 30px; font-size: 0.9rem; color: #666; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>{{ company_name }}</h1>
              <h2>Customer Portal</h2>
              <div class="status">
                <strong>System Status:</strong> Operational
              </div>
              <div class="host">
                <strong>Server:</strong> {{ inventory_hostname }}
              </div>
              <p>Welcome to the {{ company_name }} secure customer portal.</p>
              <p>This application server processes financial transactions and
                 requires the highest security posture.</p>
              <div class="footer">
                <p>Internal use only. Unauthorized access is prohibited.</p>
              </div>
            </div>
          </body>
          </html>
        dest: /var/www/html/index.html
        owner: apache
        group: apache
        mode: "0644"

    - name: Reset httpd failed state if needed
      ansible.builtin.command:
        cmd: systemctl reset-failed httpd
      changed_when: false
      failed_when: false

    - name: Validate httpd configuration
      ansible.builtin.command:
        cmd: httpd -t
      register: _httpd_configtest
      changed_when: false

    - name: Enable and start httpd
      ansible.builtin.systemd:
        name: httpd
        state: restarted
        enabled: true

    - name: Configure errata repository
      ansible.builtin.copy:
        content: |
          [dcc-errata]
          name=DCC Workshop Errata Repository
          baseurl=http://{{ central_host }}:{{ errata_repo_port }}/
          enabled=1
          gpgcheck=0
          skip_if_unavailable=True
        dest: /etc/yum.repos.d/dcc-errata.repo
        mode: "0644"

    - name: Verify errata repo is reachable
      ansible.builtin.command: dnf repolist dcc-errata
      register: _repolist
      changed_when: false
      retries: 3
      delay: 5
      until: "'dcc-errata' in _repolist.stdout"

    - name: Verify CVE appears in advisory list
      ansible.builtin.command: yum updateinfo list cves --quiet
      register: _cve_check
      changed_when: false

    - name: Confirm target CVE is detectable
      ansible.builtin.assert:
        that:
          - target_cve in _cve_check.stdout
        fail_msg: >-
          {{ target_cve }} not found in advisory list.
        success_msg: "{{ target_cve }} detected on {{ inventory_hostname }}"

    - name: Create backup marker file for pre-patch policy gate
      ansible.builtin.file:
        path: /var/log/last-backup-timestamp
        state: touch
        mode: "0644"
        modification_time: preserve
        access_time: preserve

    # ── Seed Splunk with CVE events for this host ─────────────────────
    - name: Send CVE detection events to Splunk for this host
      ansible.builtin.uri:
        url: "{{ splunk_hec_url }}"
        method: POST
        headers:
          Authorization: "Splunk {{ splunk_hec_token }}"
        validate_certs: false
        body_format: json
        body:
          host: "{{ inventory_hostname }}"
          source: "{{ item.source }}"
          sourcetype: "linux_secure"
          index: "main"
          event: "{{ item.event }}"
        status_code: [200]
      loop:
        - source: "/var/log/secure"
          event: >-
            vulnerability-scanner[2103]: CRITICAL: {{ target_cve }} confirmed on httpd service (port 443).
            Package httpd-{{ vulnerable_httpd_version }} requires update per {{ target_advisory }}.
            CVSS 9.8 - Apache HTTP Server SSRF via mod_rewrite. Immediate action required.
            Host: {{ inventory_hostname }}
        - source: "/var/log/secure"
          event: >-
            httpd[1842]: ModSecurity: Warning. Matched vulnerability signature for {{ target_cve }}.
            Apache HTTP Server affected by SSRF in mod_rewrite configurations
            allowing unsafe RewriteRules [severity CRITICAL] [host {{ inventory_hostname }}]
        - source: "/var/log/httpd/error_log"
          event: >-
            [security:alert] httpd vulnerability detected: {{ target_cve }} affects httpd-{{ vulnerable_httpd_version }}.
            Server-Side Request Forgery via mod_rewrite. Service exposed on 0.0.0.0:443.
            Risk: unauthenticated remote attacker can forge requests to internal services.
            Host: {{ inventory_hostname }}
      loop_control:
        label: "{{ item.source }}"

    - name: Report deployment status
      ansible.builtin.debug:
        msg: |
          Application deployed on {{ inventory_hostname }}:
            httpd:      httpd-{{ vulnerable_httpd_version }} (vulnerable)
            CVE staged: {{ target_cve }}
            Portal:     http://{{ inventory_hostname }}
            Splunk:     CVE detection events sent

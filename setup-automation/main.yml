---
# Phase 1: Build dynamic inventory with per-host network variables
- name: Create inventory
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../config/secrets.yaml
  tasks:
    - name: Add vault host
      ansible.builtin.add_host:
        name: vault
        ansible_ssh_host: vault
        ansible_ssh_port: "{{ lookup('ansible.builtin.env', 'BASTION_PORT') }}"
        ansible_ssh_user: "{{ lookup('ansible.builtin.env', 'BASTION_USER') }}"
        ansible_ssh_pass: "{{ lookup('ansible.builtin.env', 'BASTION_PASSWORD') }}"
        ansible_become_password: "{{ lookup('ansible.builtin.env', 'BASTION_PASSWORD') }}"
        ansible_python_interpreter: /usr/libexec/platform-python
        net_interface: eth1
        net_address: 192.168.1.12/24
        net_dns: ""
        net_dns_search: ""
        selinux_mode: permissive

    - name: Add central host
      ansible.builtin.add_host:
        name: central
        ansible_ssh_host: central
        ansible_ssh_port: "{{ lookup('ansible.builtin.env', 'BASTION_PORT') }}"
        ansible_ssh_user: "{{ lookup('ansible.builtin.env', 'BASTION_USER') }}"
        ansible_ssh_pass: "{{ lookup('ansible.builtin.env', 'BASTION_PASSWORD') }}"
        ansible_become_password: "{{ lookup('ansible.builtin.env', 'BASTION_PASSWORD') }}"
        ansible_python_interpreter: /usr/libexec/platform-python
        net_interface: eth1
        net_address: 192.168.1.11/24
        net_dns: ""
        net_dns_search: ""
        selinux_mode: permissive

    - name: Add control host
      ansible.builtin.add_host:
        name: control
        ansible_ssh_host: control
        ansible_ssh_port: "{{ lookup('ansible.builtin.env', 'BASTION_PORT') }}"
        ansible_ssh_user: "{{ lookup('ansible.builtin.env', 'BASTION_USER') }}"
        ansible_ssh_pass: "{{ lookup('ansible.builtin.env', 'BASTION_PASSWORD') }}"
        ansible_become_password: "{{ lookup('ansible.builtin.env', 'BASTION_PASSWORD') }}"
        ansible_python_interpreter: /usr/libexec/platform-python
        net_interface: eth1
        net_address: 192.168.1.10/24
        net_dns: ""
        net_dns_search: ""
        selinux_mode: permissive

    - name: Add rhel01 host (app server)
      ansible.builtin.add_host:
        name: rhel01
        ansible_ssh_host: rhel01
        ansible_ssh_port: "{{ lookup('ansible.builtin.env', 'BASTION_PORT') }}"
        ansible_ssh_user: "{{ lookup('ansible.builtin.env', 'BASTION_USER') }}"
        ansible_ssh_pass: "{{ lookup('ansible.builtin.env', 'BASTION_PASSWORD') }}"
        ansible_become_password: "{{ lookup('ansible.builtin.env', 'BASTION_PASSWORD') }}"
        ansible_python_interpreter: /usr/libexec/platform-python
        net_interface: eth1
        net_address: 192.168.1.13/24
        net_dns: ""
        net_dns_search: ""
        selinux_mode: enforcing

    - name: Add rhel02 host (spare)
      ansible.builtin.add_host:
        name: rhel02
        ansible_ssh_host: rhel02
        ansible_ssh_port: "{{ lookup('ansible.builtin.env', 'BASTION_PORT') }}"
        ansible_ssh_user: "{{ lookup('ansible.builtin.env', 'BASTION_USER') }}"
        ansible_ssh_pass: "{{ lookup('ansible.builtin.env', 'BASTION_PASSWORD') }}"
        ansible_become_password: "{{ lookup('ansible.builtin.env', 'BASTION_PASSWORD') }}"
        ansible_python_interpreter: /usr/libexec/platform-python
        net_interface: eth1
        net_address: 192.168.1.14/24
        net_dns: ""
        net_dns_search: ""
        selinux_mode: permissive

# Phase 2: Common bootstrap on all hosts in parallel (~90s)
- name: Common bootstrap
  hosts: all:!localhost
  gather_facts: false
  become: true
  vars_files:
    - ../config/secrets.yaml
  vars:
    tmm_org: "{{ tmm_orgid }}"
    tmm_id: "{{ tmm_activation }}"
    hosts_entries:
      - ip: 192.168.1.10
        names: control.dcc.lab control
      - ip: 192.168.1.11
        names: central.dcc.lab central splunk.dcc.lab opa.dcc.lab
      - ip: 192.168.1.12
        names: vault.dcc.lab vault
      - ip: 192.168.1.13
        names: rhel01.dcc.lab rhel01
      - ip: 192.168.1.14
        names: rhel02.dcc.lab rhel02
  tasks:
    - name: Wait for SSH
      ansible.builtin.wait_for_connection:

    - name: Run common bootstrap tasks
      ansible.builtin.include_tasks: tasks/common-bootstrap.yml

# Phase 3: Host-specific bootstrap in parallel
# vault: license + unseal
# central: clone content repo, deploy Splunk + OPA containers
# control: packages, collections install
- name: Host-specific bootstrap
  hosts: all:!localhost
  gather_facts: false
  become: true
  any_errors_fatal: true
  vars_files:
    - ../config/secrets.yaml
  vars:
    satellite_url: "{{ lookup('ansible.builtin.env', 'SATELLITE_URL') }}"
    satellite_org: "{{ lookup('ansible.builtin.env', 'SATELLITE_ORG') }}"
    satellite_activationkey: "{{ lookup('ansible.builtin.env', 'SATELLITE_ACTIVATIONKEY') }}"
    guid: "{{ lookup('ansible.builtin.env', 'GUID') }}"
    domain: "{{ lookup('ansible.builtin.env', 'DOMAIN') }}"
  tasks:
    - name: Create setup-scripts directory
      ansible.builtin.file:
        path: /tmp/setup-scripts/
        state: directory
        mode: '0755'

    - name: Check if bootstrap script exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/setup-{{ inventory_hostname }}.sh"
      delegate_to: localhost
      become: false
      register: r_script_test

    - name: Copy bootstrap script
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/setup-{{ inventory_hostname }}.sh"
        dest: "/tmp/setup-scripts/setup-{{ inventory_hostname }}.sh"
        mode: '0755'
      when: r_script_test.stat.exists

    - name: Execute bootstrap script
      ansible.builtin.shell: |
        LOG=/tmp/setup-scripts/setup-{{ inventory_hostname }}-$(date +%Y%m%d-%H%M%S).log
        sh -x /tmp/setup-scripts/setup-{{ inventory_hostname }}.sh > "$LOG" 2>&1
        SCRIPT_RC=$?
        ln -sf "$LOG" /tmp/setup-scripts/setup-{{ inventory_hostname }}-latest.log
        exit $SCRIPT_RC
      when: r_script_test.stat.exists
      register: r_result
      environment:
        SATELLITE_URL: "{{ satellite_url }}"
        SATELLITE_ORG: "{{ satellite_org }}"
        SATELLITE_ACTIVATIONKEY: "{{ satellite_activationkey }}"
        GUID: "{{ guid }}"
        DOMAIN: "{{ domain }}"
        REG_KEY: "{{ reg_username }}"
        REG_PASS: "{{ reg_password }}"
        SSH_KEY: "{{ ssh_key }}"
        VAULT_LIC: "{{ vaultlic }}"
        AH_TOKEN: "{{ ahtoken }}"
        TMM_ID: "{{ tmm_activation }}"
        TMM_ORG: "{{ tmm_orgid }}"

    - name: Show bootstrap output
      ansible.builtin.debug:
        var: r_result.stdout_lines
      when: r_result is defined and r_result.stdout_lines is defined

    - name: Save bootstrap output
      ansible.builtin.copy:
        content: "{{ r_result.stdout | default(r_result.stderr) | default(r_result) }}"
        dest: "/tmp/{{ inventory_hostname }}-bootstrap.out"
      delegate_to: localhost
      become: false
      when: r_result is defined

    - name: Fail if bootstrap failed
      ansible.builtin.fail:
        msg: "Bootstrap failed for {{ inventory_hostname }}"
      when:
        - r_result is defined
        - r_result.rc is defined
        - r_result.rc != 0

# Phase 4: Central configure
# Waits for Vault, then runs DCC setup playbooks from content repo
- name: Central service-dependent configuration
  hosts: central
  gather_facts: false
  become: true
  any_errors_fatal: true
  vars_files:
    - ../config/secrets.yaml
  vars:
    guid: "{{ lookup('ansible.builtin.env', 'GUID') }}"
    domain: "{{ lookup('ansible.builtin.env', 'DOMAIN') }}"
  tasks:
    - name: Wait for Vault to be unsealed
      ansible.builtin.command: vault status -address=http://127.0.0.1:8200
      delegate_to: vault
      register: r_vault_ready
      until: r_vault_ready.rc == 0
      retries: 30
      delay: 10
      changed_when: false

    - name: Copy central configure script
      ansible.builtin.copy:
        src: ./setup-central-configure.sh
        dest: /tmp/setup-scripts/setup-central-configure.sh
        mode: '0755'

    - name: Execute central configure script
      ansible.builtin.shell: |
        LOG=/tmp/setup-scripts/setup-central-configure-$(date +%Y%m%d-%H%M%S).log
        sh -x /tmp/setup-scripts/setup-central-configure.sh > "$LOG" 2>&1
        SCRIPT_RC=$?
        ln -sf "$LOG" /tmp/setup-scripts/setup-central-configure-latest.log
        exit $SCRIPT_RC
      register: r_central_configure
      environment:
        GUID: "{{ guid }}"
        DOMAIN: "{{ domain }}"
        AH_TOKEN: "{{ ahtoken }}"
        TMM_ID: "{{ tmm_activation }}"
        TMM_ORG: "{{ tmm_orgid }}"

    - name: Show central configure output
      ansible.builtin.debug:
        var: r_central_configure.stdout_lines
      when: r_central_configure.stdout_lines is defined

    - name: Save central configure output
      ansible.builtin.copy:
        content: "{{ r_central_configure.stdout | default(r_central_configure.stderr) | default(r_central_configure) }}"
        dest: /tmp/central-configure.out
      delegate_to: localhost
      become: false

    - name: Fail if central configure failed
      ansible.builtin.fail:
        msg: "Central configure phase failed"
      when:
        - r_central_configure.rc is defined
        - r_central_configure.rc != 0

# Phase 5: Control configure
# Runs DCC AAP and EDA configuration playbooks
- name: Control AAP configuration
  hosts: control
  gather_facts: false
  become: true
  vars_files:
    - ../config/secrets.yaml
  vars:
    guid: "{{ lookup('ansible.builtin.env', 'GUID') }}"
    domain: "{{ lookup('ansible.builtin.env', 'DOMAIN') }}"
  tasks:
    - name: Wait for Vault KV secret engine to be mounted
      ansible.builtin.uri:
        url: "http://192.168.1.12:8200/v1/sys/internal/ui/mounts/secret"
        status_code: [200, 403, 404]
      register: r_vault_kv_ready
      until: r_vault_kv_ready.status in [200, 403]
      retries: 12
      delay: 10
      become: false

    - name: Copy control configure script
      ansible.builtin.copy:
        src: ./setup-control-configure.sh
        dest: /tmp/setup-scripts/setup-control-configure.sh
        mode: '0755'

    - name: Execute control configure script
      ansible.builtin.shell: |
        LOG=/tmp/setup-scripts/setup-control-configure-$(date +%Y%m%d-%H%M%S).log
        sh -x /tmp/setup-scripts/setup-control-configure.sh > "$LOG" 2>&1
        SCRIPT_RC=$?
        ln -sf "$LOG" /tmp/setup-scripts/setup-control-configure-latest.log
        exit $SCRIPT_RC
      register: r_control_configure
      environment:
        GUID: "{{ guid }}"
        DOMAIN: "{{ domain }}"
        AH_TOKEN: "{{ ahtoken }}"
        TMM_ID: "{{ tmm_activation }}"
        TMM_ORG: "{{ tmm_orgid }}"

    - name: Show control configure output
      ansible.builtin.debug:
        var: r_control_configure.stdout_lines
      when: r_control_configure.stdout_lines is defined

    - name: Save control configure output
      ansible.builtin.copy:
        content: "{{ r_control_configure.stdout | default(r_control_configure.stderr) | default(r_control_configure) }}"
        dest: /tmp/control-configure.out
      delegate_to: localhost
      become: false

    - name: Fail if control configure failed
      ansible.builtin.fail:
        msg: "Control configure phase failed"
      when:
        - r_control_configure.rc is defined
        - r_control_configure.rc != 0
